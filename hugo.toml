# 1. 基础全局配置
baseURL = 'https://nineanswerer.github.io/'
languageCode = 'zh-cn'  # 建议改为 zh-cn，这样搜索和日期显示更符合中文习惯
title = 'NineAnswerer 的个人博客'
theme = 'PaperMod'

# 2. 代码高亮配置 (必须放在全局，不能放在 params 里)
pygmentsCodefences = true
pygmentsStyle = "monokai" 

# 3. 输出配置 (开启搜索功能必备)
[outputs]
    home = ["HTML", "RSS", "JSON"]

# 4. 菜单配置 (weight 越小越靠左)
[[menu.main]]
    name = "搜索"
    url = "/search"
    weight = 5

[[menu.main]]
    name = "存档"
    url = "/archives"
    weight = 10

[[menu.main]]
    name = "关于"
    url = "/about"
    weight = 20

# 5. 主题参数配置 (所有的开关和自定义信息都在这里)
[params]
    # --- 基础功能开关 ---
    ShowToc = true           # 自动显示目录
    TocOpen = true           # 默认展开目录
    ShowReadingTime = true    # 显示阅读时间
    ShowPostNavLinks = true   # 显示上一篇/下一篇文章
    ShowWordCount = true
    env = "production"        # 生产环境控制
    displayFullPostContent = false
    showShareButtons = true
    ShowCodeCopyButtons = true # 开启代码块右上角的复制按钮
    comments = true
    description = "NineAnswerer 的技术博客 - 专注于大数据、AI 与机器学习实战分享"
    keywords = ["大数据", "HBase", "Hadoop", "机器学习", "Hugo", "PaperMod"]
    author = "NineAnswerer"
    hasCJKLanguage = true        # 开启中日韩语言支持，否则字数统计会不准

    # --- 首页个人名片模式 (Profile Mode) ---
    [params.homeInfoParams]
        Title = "你好，我是 NineAnswerer 👋"
        Content = "Focus on Computer Science | Big Data | AI & Robotics. 欢迎交流！"

    # --- 社交图标配置 ---
    [[params.socialIcons]]
        name = "github"
        url = "https://github.com/nineanswerer"

    [[params.socialIcons]]
        name = "email"
        url = "mailto:你的真实邮箱@example.com"

    # --- 资源配置 ---
    [params.assets]
        disableHLJS = false # 确保代码高亮生效